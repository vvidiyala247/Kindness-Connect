name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  changes:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
      api: ${{ steps.filter.outputs.api }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'artifacts/mobile/**'
            api:
              - 'artifacts/api-server/**'
            shared:
              - 'lib/**'
              - 'scripts/**'
              - 'tsconfig*.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.mobile == 'true' ||
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.shared == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
          key: ${{ runner.os }}-node24-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  test-mobile:
    name: Mobile Test Suite
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: >
      always() &&
      needs.install.result != 'failure' &&
      (needs.changes.outputs.mobile == 'true' || needs.changes.outputs.shared == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
          key: ${{ runner.os }}-node24-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Run mobile test suite
        run: pnpm --filter @workspace/mobile test --ci

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: >
      always() &&
      needs.install.result != 'failure' &&
      (needs.changes.outputs.mobile == 'true' ||
       needs.changes.outputs.api == 'true' ||
       needs.changes.outputs.shared == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
          key: ${{ runner.os }}-node24-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Run type checks
        run: pnpm typecheck

  test-api:
    name: API Server Tests
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: >
      always() &&
      needs.install.result != 'failure' &&
      (needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
          key: ${{ runner.os }}-node24-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          fail-on-cache-miss: true

      - name: Run API server tests
        run: pnpm --filter @workspace/api-server test
